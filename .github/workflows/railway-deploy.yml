# Deploy API + Web lên Railway khi push main (hoặc chạy tay).
#
# Thiết lập 1 lần (trên máy bạn):
#   gh secret set RAILWAY_TOKEN --repo apiipc/gamephanloai
#   (dán Project Token từ Railway → Settings → Tokens)
#
# Sau khi API có domain, thêm:
#   gh secret set VITE_API_URL --repo apiipc/gamephanloai
#   (vd. https://api-production-xxxx.up.railway.app)
#
# Trên Railway — quan trọng (tránh watch paths + đủ context Docker):
#   - Service **api** và **web**: Settings → Source → **Root Directory để TRỐNG** (repo root).
#   - Biến: **web** cần `RAILWAY_DOCKERFILE_PATH=Dockerfile.web`. **api** dùng `Dockerfile` ở gốc repo.
#   - Có thể xóa / để trống **Config as code** (railway.toml) nếu chỉ dùng Dockerfile.
#
# Script local: ./scripts/railway-provision.sh (set biến + deploy)

name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'Dockerfile'
      - 'Dockerfile.web'
      - '.dockerignore'
      - 'package-lock.json'
      - '.github/workflows/railway-deploy.yml'
  workflow_dispatch:

env:
  RAILWAY_ENVIRONMENT: production

jobs:
  deploy-api:
    name: Deploy API
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy apps/api
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Thiếu GitHub secret RAILWAY_TOKEN"
            exit 1
          fi
          railway up . \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service api \
            --detach \
            --message "deploy api from GitHub Actions"

  deploy-web:
    name: Deploy Web
    needs: deploy-api
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy apps/web
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Thiếu GitHub secret RAILWAY_TOKEN"
            exit 1
          fi
          if [ -n "$VITE_API_URL" ]; then
            export VITE_API_URL
          fi
          railway up . \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service web \
            --detach \
            --message "deploy web from GitHub Actions"
