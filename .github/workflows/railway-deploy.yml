# Deploy **web + API gộp** một image (Dockerfile gốc) lên Railway khi push main.
#
# Thiết lập 1 lần:
#   gh secret set RAILWAY_TOKEN --repo your/repo
# Trên Railway: một service (vd. api) — Root Directory trống — không cần RAILWAY_DOCKERFILE_PATH.
#
# Biến FRONTEND_URL / DATABASE_URL / JWT_SECRET: set trên Railway (vd. script railway-provision.sh).

name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'Dockerfile'
      - 'Dockerfile.web'
      - '.dockerignore'
      - 'package-lock.json'
      - 'railway.toml'
      - '.github/workflows/railway-deploy.yml'
  workflow_dispatch:

env:
  RAILWAY_ENVIRONMENT: production
  RAILWAY_SERVICE: api

jobs:
  deploy:
    name: Deploy unified stack
    runs-on: ubuntu-latest
    container: ghcr.io/railwayapp/cli:latest
    steps:
      - uses: actions/checkout@v4

      - name: railway up
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Thiếu GitHub secret RAILWAY_TOKEN"
            exit 1
          fi
          # Không dùng `railway up .` — một số bản CLI báo "prefix not found" khi có path `.`
          railway up \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE" \
            --detach \
            --message "unified deploy from GitHub Actions"
