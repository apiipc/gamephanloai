# Deploy unified Docker image (web + API) lên Railway.
# Cần GitHub secret: RAILWAY_TOKEN (Project Token từ Railway → Settings → Tokens)

name: Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - 'apps/web/**'
      - 'Dockerfile'
      - 'Dockerfile.web'
      - '.dockerignore'
      - 'package-lock.json'
      - 'railway.toml'
      - '.github/workflows/railway-deploy.yml'
  workflow_dispatch:

env:
  RAILWAY_PROJECT_ID: 1323cca9-cdce-4443-b158-f6f7c903a453
  RAILWAY_ENVIRONMENT: production
  RAILWAY_SERVICE: api
  RAILWAY_APP_URL: https://hocxanh.up.railway.app

jobs:
  deploy:
    name: Build & deploy to Railway
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Build web (lấy hash bundle để verify sau deploy)
        run: |
          npm ci
          npm run build -w apps/web
          ls apps/web/dist/assets/Jumping_Over_Puddles*.mp3
          JS=$(grep -oE 'index-[A-Za-z0-9_-]+\.js' apps/web/dist/index.html | head -1)
          echo "EXPECTED_JS=$JS" >> "$GITHUB_ENV"
          echo "Expect production to serve: /assets/$JS"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Bump deploy markers (trong watch paths — không đụng code game)
        run: |
          STAMP="${GITHUB_SHA} $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          echo "$STAMP" >> apps/web/.railway-deploy-bump
          echo "$STAMP" >> apps/api/.railway-deploy-bump
          git status --short apps/web/.railway-deploy-bump apps/api/.railway-deploy-bump

      - name: railway up (chờ build Docker — không dùng --detach)
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "::error::Thiếu GitHub secret RAILWAY_TOKEN"
            exit 1
          fi
          railway up \
            --project "$RAILWAY_PROJECT_ID" \
            --environment "$RAILWAY_ENVIRONMENT" \
            --service "$RAILWAY_SERVICE" \
            --ci \
            --message "GHA deploy ${GITHUB_SHA::7}"

      - name: Verify production đã nhận bundle mới
        run: |
          for i in $(seq 1 24); do
            HTML=$(curl -sf "$RAILWAY_APP_URL/" || true)
            if echo "$HTML" | grep -q "$EXPECTED_JS"; then
              echo "OK — $RAILWAY_APP_URL đã chạy $EXPECTED_JS"
              curl -sfI "$RAILWAY_APP_URL/assets/$EXPECTED_JS" | head -5
              exit 0
            fi
            LIVE=$(echo "$HTML" | grep -oE 'index-[A-Za-z0-9_-]+\.js' | head -1 || true)
            echo "Lần $i: production=$LIVE mong đợi=$EXPECTED_JS — chờ 30s..."
            sleep 30
          done
          echo "::error::Production vẫn chưa cập nhật bundle"
          curl -sf "$RAILWAY_APP_URL/" | grep -oE 'index-[A-Za-z0-9_-]+\.(js|css)' || true
          exit 1
