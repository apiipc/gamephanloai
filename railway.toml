# Railway config — service app (Root Directory trống, Dockerfile gốc)
# https://docs.railway.com/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
# GHA `railway up` upload snapshot — phải match mọi thay đổi, tránh "build will skip"
watchPatterns = ["**"]

[deploy]
startCommand = "sh -c \"npx prisma db push && node dist/main.js\""
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
