# Railway: đặt Root Directory = apps/api (hoặc deploy service trỏ vào thư mục này)
[build]
builder = "NIXPACKS"
buildCommand = "npm install && npx prisma generate && npm run build"

[deploy]
startCommand = "npx prisma db push && node dist/src/main.js"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
